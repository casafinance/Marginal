name: Release

# Two ways to trigger a release:
#   1. Actions tab -> "Release" -> "Run workflow" -> type a version (e.g. 1.0.3).
#      This bumps tauri.conf.json / Cargo.toml / package.json for you, commits,
#      tags, then builds + publishes. This is the normal way to ship an update.
#   2. Push/publish a tag matching v* yourself (the old manual way still works as
#      a fallback) -- but then YOU must have already bumped the three version
#      files yourself, same as before.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: 'New version, e.g. 1.0.3 (no leading "v"; must be higher than the current version)'
        required: true

permissions:
  contents: write

jobs:
  bump-and-tag:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump tauri.conf.json + Cargo.toml + package.json
        id: tag
        env:
          NEW_VERSION: ${{ github.event.inputs.version }}
        run: |
          cat > /tmp/bump.js <<'EOF'
          const fs = require('fs');

          const newV = process.env.NEW_VERSION;
          if (!/^\d+\.\d+\.\d+$/.test(newV)) {
            console.error(`Version must look like 1.2.3 (numbers only, no leading "v"). Got: "${newV}"`);
            process.exit(1);
          }
          const parts = (s) => s.split('.').map(Number);
          const isHigher = (a, b) => {
            const pa = parts(a), pb = parts(b);
            for (let i = 0; i < 3; i++) { if (pa[i] !== pb[i]) return pa[i] > pb[i]; }
            return false;
          };

          const tauriPath = 'src-tauri/tauri.conf.json';
          const tauri = JSON.parse(fs.readFileSync(tauriPath, 'utf8'));
          const currentV = tauri.version;

          if (!isHigher(newV, currentV)) {
            console.error(`New version (${newV}) must be higher than the current version (${currentV}).`);
            process.exit(1);
          }

          tauri.version = newV;
          fs.writeFileSync(tauriPath, JSON.stringify(tauri, null, 2) + '\n');

          const pkgPath = 'package.json';
          const pkg = JSON.parse(fs.readFileSync(pkgPath, 'utf8'));
          pkg.version = newV;
          fs.writeFileSync(pkgPath, JSON.stringify(pkg, null, 2) + '\n');

          const cargoPath = 'src-tauri/Cargo.toml';
          let cargo = fs.readFileSync(cargoPath, 'utf8');
          cargo = cargo.replace(/^version = ".*"/m, `version = "${newV}"`);
          fs.writeFileSync(cargoPath, cargo);

          console.log(`Bumped ${currentV} -> ${newV}`);
          EOF
          node /tmp/bump.js
          echo "tag=v${NEW_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Commit the version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src-tauri/tauri.conf.json src-tauri/Cargo.toml package.json
          git commit -m "Bump version to ${{ github.event.inputs.version }}"
          git push

      - name: Tag the release commit
        run: |
          git tag "${{ steps.tag.outputs.tag }}"
          git push origin "${{ steps.tag.outputs.tag }}"

  build-windows:
    needs: [bump-and-tag]
    if: always() && (github.event_name == 'push' || needs.bump-and-tag.result == 'success')
    runs-on: windows-latest
    steps:
      - name: Work out which tag to build
        id: ref
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ needs.bump-and-tag.outputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout the tagged commit
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.ref.outputs.tag }}

      - name: Speed up the build (Windows Defender scans every file Rust writes otherwise)
        shell: powershell
        run: |
          Add-MpPreference -ExclusionPath "$env:USERPROFILE\.cargo"
          Add-MpPreference -ExclusionPath "$env:USERPROFILE\.rustup"
          Add-MpPreference -ExclusionPath "${{ github.workspace }}"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: npm install

      - name: Build, sign, and publish the installer
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ steps.ref.outputs.tag }}
          releaseName: "Marginal ${{ steps.ref.outputs.tag }}"
          releaseBody: "Download the .exe under Assets to install (no admin needed)."
          releaseDraft: false
          prerelease: false
